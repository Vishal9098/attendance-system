services:
  - type: web
    name: attendance-backend
    env: python

    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install --no-cache-dir -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: MONGODB_URL
        sync: false

      - key: SECRET_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false